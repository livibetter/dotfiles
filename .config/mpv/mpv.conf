osd-level=0
osd-font="Envy Code R"
volume-max=200
cache=yes
demuxer-max-bytes=1073741824
script-opts=ytdl_hook-ytdl_path=yt-dlp
ytdl-format=1080p/best[height=1080]/248+251/303+251/720p/best[height=720]/247+251/best

# Enable sub-blur for softer subtitles/borders
sub-blur=1.0  # Adjust value (e.g., 0.5 to 2.0) for blur intensity
# Crucial: Disable the default border for sub-blur to work well
sub-border-size=5
